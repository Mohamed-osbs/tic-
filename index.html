<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XO — Neon Tic-Tac-Toe</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Press Start 2P: pixel/arcade feel for headings -->
  <!-- Rajdhani: sharp, techy feel for body text -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="noise"></div>

  <div class="app">

    <!-- ── Header ── -->
    <header class="header">
      <h1 class="logo">XO</h1>
      <p class="subtitle">Neon Edition</p>
    </header>

    <!-- ── Mode Toggle ── -->
    <div class="mode-bar">
      <button class="mode-btn active" id="btn-pvp">2 Players</button>
      <button class="mode-btn" id="btn-ai">vs CPU</button>
    </div>

    <!-- ── Scoreboard ── -->
    <div class="scoreboard">
      <div class="score-card" id="score-x">
        <span class="score-label player-x">Player X</span>
        <span class="score-value" id="score-x-val">0</span>
      </div>
      <div class="score-card draws">
        <span class="score-label">Draws</span>
        <span class="score-value" id="score-draw-val">0</span>
      </div>
      <div class="score-card" id="score-o">
        <span class="score-label player-o">Player O</span>
        <span class="score-value" id="score-o-val">0</span>
      </div>
    </div>

    <!-- ── Status Banner ── -->
    <div class="status-banner" id="status-banner">
      <span id="status-text">Player X's Turn</span>
    </div>

    <!-- ── Board ── -->
    <div class="board" id="board" role="grid" aria-label="Tic-Tac-Toe board">
      <!-- 9 cells generated by JS -->
    </div>

    <!-- ── Controls ── -->
    <div class="controls">
      <button class="btn-control" id="btn-restart">Restart</button>
      <button class="btn-control secondary" id="btn-reset-score">Reset Score</button>
    </div>

  </div><!-- /.app -->

  <script src="script.js"></script>
</body>
</html>
